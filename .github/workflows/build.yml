name: Build APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 8.6

      - name: Build debug APK (installable, for quick testing)
        run: gradle assembleDebug --stacktrace

      - name: Build release APK (minified with R8, unsigned)
        run: gradle assembleRelease --stacktrace

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: ImageToPDF-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk

      - name: Upload release APK (unsigned)
        uses: actions/upload-artifact@v4
        with:
          name: ImageToPDF-release-unsigned-apk
          path: app/build/outputs/apk/release/app-release-unsigned.apk
